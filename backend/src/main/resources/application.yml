server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  datasource:
    url: jdbc:mysql://localhost:3306/vibook_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1234
  jpa:
    hibernate:
      # Local dev: sync schema from entities (adds missing tables/columns, e.g. event_favorites).
      # Production: prefer validate or none + versioned migrations.
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: UTC

vibook:
  demo:
    # Set to true to auto-create a sample CONFIRMED booking (first user + first event) for rating API tests.
    rating-data: false
  # Dev-friendly CORS for Expo / local web. Tighten allowed-origin-patterns in production.
  cors:
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      # LAN dev (Vite / Expo on another machine). Tighten in production.
      - "http://192.168.*:*"
      - "http://10.*:*"
      - "http://172.16.*:*"
      - "http://172.17.*:*"
      - "http://172.18.*:*"
      - "http://172.19.*:*"
      - "http://172.20.*:*"
      - "http://172.21.*:*"
      - "http://172.22.*:*"
      - "http://172.23.*:*"
      - "http://172.24.*:*"
      - "http://172.25.*:*"
      - "http://172.26.*:*"
      - "http://172.27.*:*"
      - "http://172.28.*:*"
      - "http://172.29.*:*"
      - "http://172.30.*:*"
      - "http://172.31.*:*"

app:
  upload:
    profile-images-dir: uploads/profile-images
    public-profile-image-path: /api/v1/files/profile-images
    business-logos-dir: uploads/business-logos
    public-business-logo-path: /api/v1/files/business-logos
    business-banners-dir: uploads/business-banners
    public-business-banner-path: /api/v1/files/business-banners
  jwt:
    secret: bXktc3VwZXItc2VjcmV0LWtleS1mb3Itdmlib29rLWp3dC1zaWduaW5nLXRva2Vucy0xMjM0NTY3ODkw
    expiration-ms: 86400000
