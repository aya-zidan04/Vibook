spring:
  application:
    name: vibook-backend

  datasource:
    # Accept both common naming styles: DB_* (Docker/CI) and DATABASE_* (Spring convention)
    url: ${DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/vibook?sslmode=disable&tcpKeepAlive=true}}
    username: ${DB_USERNAME:${DATABASE_USERNAME:vibook}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:vibook}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 20000
      pool-name: vibook-pool

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized
  health:
    db:
      enabled: true

vibook:
  security:
    jwt:
      secret: ${JWT_SECRET:}
      access-token-minutes: ${JWT_ACCESS_MINUTES:15}
      refresh-token-days: ${JWT_REFRESH_DAYS:7}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.orm.jdbc.bind: WARN
    com.zaxxer.hikari: INFO

---
# Production: no insecure defaults in YAML — bootstrap validates JWT; set DB_* or DATABASE_* from secrets.
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL:${DATABASE_URL:?Set DB_URL or DATABASE_URL (e.g. jdbc:postgresql://host:5432/vibook?sslmode=require)}}
    username: ${DB_USERNAME:${DATABASE_USERNAME:?Set DB_USERNAME or DATABASE_USERNAME}}
    password: ${DB_PASSWORD:${DATABASE_PASSWORD:?Set DB_PASSWORD or DATABASE_PASSWORD}}

vibook:
  security:
    jwt:
      secret: ${JWT_SECRET:?Set JWT_SECRET to a long random string (32+ bytes recommended)}
