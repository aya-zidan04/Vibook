spring:
  datasource:
    url: jdbc:h2:mem:vibook_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  jwt:
    secret: vibook-test-jwt-secret-at-least-32-bytes-long
    expiration-ms: 3600000
