# Local PostgreSQL for Vibook backend (Flyway + JPA).
# From backend/: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: vibook-postgres
    environment:
      POSTGRES_USER: vibook
      POSTGRES_PASSWORD: vibook
      POSTGRES_DB: vibook
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibook -d vibook"]
      interval: 5s
      timeout: 5s
      retries: 5
